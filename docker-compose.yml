version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Automatically link to the redis container over the internal docker network
      - REDIS_URL=redis://redis:6379
      - API_KEY=secret-super-key-123
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always

volumes:
  redis-data:
